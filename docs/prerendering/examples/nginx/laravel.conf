map $http_user_agent $is_webbot {
  default 0;
  "~*(?:\.net crawler|360spider|50\.nu|8bo crawler bot|aboundex|accoona|adldxbot|ahrefsbot|altavista|appengine-google|applebot|archiver|arielisbot|ask jeeves|auskunftbot|baidumobaider|baiduspider|becomebot|bingbot|bingpreview|bitbot|bitlybot|blitzbot|blogbridge|boardreader|botseer|catchbot|catchpoint bot|charlotte|checklinks|cliqzbot|clumboot|coccocbot|converacrawler|crawl-e|crawlconvera|dataparksearch|daum|deusu|discordbot|dotbot|duckduckbot|elefent|embedly|evernote|exabot|facebookbot|facebookexternalhit|meta-external|fatbot|fdse robot|feed seeker bot|feedfetcher|femtosearchbot|findlinks|flamingo_searchengine|flipboard|followsite bot|furlbot|fyberspider|gaisbot|galaxybot|geniebot|genieo|gigablast|gigabot|girafabot|gomezagent|gonzo1|googlebot|google sketchup|adsbot-google|google-structured-data-testing-tool|google-extended|developers\.google\.com/\+/web/snippet|haosouspider|heritrix|holmes|hoowwwer|htdig|ia_archiver|idbot|infuzapp|innovazion crawler|instagram|internetarchive|iqdb|iskanie|istellabot|izsearch\.com|kaloogabot|kaz\.kz_bot|kd bot|konqueror|kraken|kurzor|larbin|leia|lesnikbot|linguee bot|linkaider|linkapediabot|linkedinbot|lite bot|llaut|lookseek|lycos|mail\.ru_bot|masidani_bot|masscan|mediapartners-google|metajobbot|mj12bot|mnogosearch|mogimogi|mojeekbot|motominerbot|mozdex|msiecrawler|msnbot|msrbot|netpursual|netresearch|netvibes|newsgator|ng-search|nicebot|nutchcvs|nuzzel|nymesis|objectssearch|odklbot|omgili|oovoo|oozbot|openfosbot|orangebot|orbiter|org_bot|outbrain|pagepeeker|pagesinventory|parsijoobot|paxleframework|peeplo screenshot bot|pinterest|plantynet_webrobot|plukkie|pompos|psbot|quora link preview|qwantify|read%20later|reaper|redcarpet|redditbot|retreiver|riddler|rival iq|rogerbot|saucenao|scooter|scrapy|scrubby|searchie|searchsight|seekbot|semanticdiscovery|seznambot|showyoubot|simplepie|simpy|sitelockspider|skypeuripreview|petalbot|slackbot|slack-imgproxy|slurp|snappy|sogou|solofield|speedyspider|speedy spider|sputnikbot|stackrambler|teeraidbot|teoma|theusefulbot|thumbshots\.ru|thumbshotsbot|tineye|tiktokspider|toweya\.com|toweyabot|tumblr|tweetedtimes|tweetmemebot|twitterbot|url2png|vagabondo|vebidoobot|viber|visionutils|vkshare|voilabot|vortex|votay bot|voyager|w3c_validator|wasalive\.bot|web-sniffer|websquash\.com|webthumb|whatsapp|whatweb|wire|wotbox|yacybot|yahoo|yandex|yeti|yisouspider|yodaobot|yooglifetchagent|yoozbot|yottaamonitor|yowedo|zao-crawler|zebot_www\.ze\.bz|zooshot|zyborgi|ai2bot|amazonbot|anthropic\.com|bard|bytespider|ccbot|chatgpt-user|claude-web|claudebot|cohere-ai|deepseek|diffbot|duckassistbot|gemini|gptbot|grok|mistralai|oai-searchbot|openai\.com|perplexity\.ai|perplexitybot|xai|youbot)" 1;
}

# CHECK AND SET ESCAPED FRAGMENT
# For more info read: https://developers.google.com/webmasters/ajax-crawling/docs/specification
map $arg__escaped_fragment_ $fragment {
  ""   "";
  default "/$arg__escaped_fragment_";
}

# FILTER OUT _escaped_fragment_ FROM GET QUERY
map $args $filtered_args {
  ~(^|&)_escaped_fragment_=[^&]*&?(.*) $1$2;
  default $args;
}

# PRE-RENDER ONLY SAFE, CACHEABLE REQUEST METHODS
map $request_method $is_prerender_method {
  default 0;
  GET 1;
  HEAD 1;
}

# DO NOT PRE-RENDER WEBSOCKET OR OTHER UPGRADE REQUESTS
map $http_upgrade $is_upgrade_request {
  default 1;
  "" 0;
}

# KEEP LARAVEL API, ADMIN, AUTH, HEALTH, SITEMAP, AND SYSTEM ENDPOINTS ON ORIGIN
map $uri $is_laravel_prerender_uri {
  default 1;
  ~^/(?:api|admin|nova|horizon|telescope|pulse|sanctum|broadcasting)(?:/|$) 0;
  ~^/(?:login|logout|register|forgot-password|reset-password|email/verify)(?:/|$) 0;
  ~^/(?:up|health|status)(?:/|$) 0;
  ~^/(?:robots\.txt|favicon\.ico)$ 0;
  ~^/(?:sitemap(?:_index)?|sitemap).*\.xml$ 0;
  ~^/[^/]+-sitemap[0-9]*\.xml$ 0;
  ~^/(?:feed|rss)(?:/|$) 0;
}

map "$is_webbot:$is_prerender_method:$is_laravel_prerender_uri:$is_upgrade_request" $laravel_prerender_webbot {
  default 0;
  "1:1:1:0" 1;
}

map "$args:$is_prerender_method:$is_laravel_prerender_uri:$is_upgrade_request" $laravel_prerender_fragment {
  default 0;
  ~(^|.*&)_escaped_fragment_=[^&]*(?:&.*)?:1:1:0$ 1;
}

server {
  listen 80;
  listen [::]:80;
  server_name example.com www.example.com;

  # DEFINE LARAVEL PUBLIC DOCUMENT ROOT
  # Use the public web root, never the project repository root.
  root /srv/example.com/current/public;
  index index.php;

  charset utf-8;
  client_max_body_size 20m;

  recursive_error_pages on;
  # CUSTOM 454 CODE FOR INTERNAL REDIRECT TO @prerendering
  error_page 454 = @prerendering;

  # DENY HIDDEN FILES, EXCEPT ACME/LETSENCRYPT CHALLENGES
  location ~ /\.(?!well-known) {
    deny all;
  }

  # DENY COMMON DEPLOYMENT SECRETS IF PUBLIC ROOT IS MISCONFIGURED
  location ~* ^/(?:\.env|artisan|composer\.(?:json|lock)|package(?:-lock)?\.json|pnpm-lock\.yaml|yarn\.lock|vite\.config\.[cm]?js|webpack\.mix\.js)$ {
    deny all;
  }

  # DO NOT EXECUTE PHP FROM PUBLIC STORAGE OR USER-WRITABLE DIRECTORIES
  location ~* ^/(?:storage|uploads|files|media|cache|tmp)/.*\.php$ {
    deny all;
  }

  location = /favicon.ico {
    access_log off;
    log_not_found off;
    try_files $uri =204;
  }

  # ALLOW LARAVEL TO SERVE DYNAMIC ROBOTS.TXT WHEN NO STATIC FILE EXISTS
  location = /robots.txt {
    access_log off;
    log_not_found off;
    try_files $uri /index.php$is_args$args;
  }

  # ALLOW LARAVEL OR SEO PACKAGES TO SERVE DYNAMIC SITEMAPS
  location ~* ^/(?:sitemap(?:_index)?|sitemap).*\.xml$ {
    access_log off;
    log_not_found off;
    try_files $uri /index.php$is_args$args;
  }

  location ~* ^/[^/]+-sitemap[0-9]*\.xml$ {
    access_log off;
    log_not_found off;
    try_files $uri /index.php$is_args$args;
  }

  # SERVE STATIC ASSETS DIRECTLY FROM NGINX
  location ~* \.(?:css|js|mjs|map|ico|gif|jpe?g|png|svg|webp|avif|woff2?|ttf|eot|otf|mp4|webm|ogg|mp3|wav|pdf|txt|xml|json)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";

    access_log off;
    log_not_found off;
    try_files $uri =404;
  }

  location / {
    # IF REQUEST RECEIVED FROM BOT OR
    # WITH "FRAGMENT" REDIRECT TO @prerendering
    if ($laravel_prerender_webbot = 1) {
      return 454;
    }
    if ($laravel_prerender_fragment = 1) {
      return 454;
    }

    # LARAVEL FRONT CONTROLLER
    try_files $uri $uri/ /index.php$is_args$args;
  }

  # EXECUTE ONLY LARAVEL FRONT CONTROLLER
  location ~ ^/index\.php(?:/|$) {
    fastcgi_split_path_info ^(.+?\.php)(/.*)$;
    try_files $fastcgi_script_name =404;

    include /etc/nginx/fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    fastcgi_param DOCUMENT_ROOT $realpath_root;
    fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    fastcgi_param PATH_INFO $fastcgi_path_info;
    fastcgi_param QUERY_STRING $query_string;
    fastcgi_param HTTPS $https if_not_empty;
    fastcgi_param HTTP_PROXY "";

    fastcgi_connect_timeout 10s;
    fastcgi_send_timeout 60s;
    fastcgi_read_timeout 60s;
    fastcgi_buffer_size 32k;
    fastcgi_buffers 16 16k;

    # Debian/Ubuntu often use /run/php/php8.x-fpm.sock.
    # RHEL/CentOS often use /run/php-fpm/www.sock.
    fastcgi_pass unix:/run/php/php-fpm.sock;
  }

  # BLOCK DIRECT ACCESS TO OTHER PHP FILES
  location ~ \.php(?:/|$) {
    return 404;
  }

  location @prerendering {
    internal;
    # SET RENDERING ENDPOINT
    # read more at: https://github.com/ostr-io/ostrio-docs/blob/master/docs/prerendering/rendering-endpoints.md
    set $renderer_domain "render.ostr.io";
    set $orig_uri $request_uri;

    # Avoid dead loop and drop get query
    if ($orig_uri ~ "^(.*)\?(.*)$") {
      set $orig_uri $1;
    }

    # Minimize amount of forwarded headers
    proxy_pass_request_headers off;
    proxy_hide_header WWW-Authenticate;
    proxy_hide_header Set-Cookie;

    # !!Very important and required:
    proxy_set_header Host $renderer_domain;
    proxy_set_header User-Agent $http_user_agent;
    proxy_set_header Connection "close";

    ########
    # Do not forget to change _YOUR_AUTH_TOKEN_ to token obtained via ostr.io
    ########
    proxy_set_header Authorization "Basic _YOUR_AUTH_TOKEN_";

    # Optional headers, pass if necessary for backend:
    # proxy_set_header Pragma $http_pragma;
    # proxy_set_header Cache-Control $http_cache_control;
    # proxy_set_header Accept $http_accept;
    # proxy_set_header Accept-Encoding $http_accept_encoding;
    # proxy_set_header Accept-Language $http_accept_language;

    # Disable keepalive support, it's not needed for Pre-rendering
    # For more info read: http://nginx.org/en/docs/http/ngx_http_proxy_module.html#proxy_http_version
    proxy_http_version 1.0;

    # ENABLE FOR SNI + SSL SETUP
    proxy_ssl_server_name on;

    # You can change resolver to local DNS server
    # And resolver can be moved to nginx.conf
    # Add ipv6=off if your server has no IPv6 support, ex.: `resolver 1.1.1.1 8.8.4.4 8.8.8.8 1.0.0.1 valid=300s ipv6=off;`
    resolver 1.1.1.1 8.8.4.4 8.8.8.8 1.0.0.1 valid=300s;
    resolver_timeout 15s;

    # Sendfile is useless for proxied requests, disable it
    # For more info read: http://nginx.org/en/docs/http/ngx_http_core_module.html#sendfile
    sendfile off;
    proxy_pass https://$renderer_domain/render/https://$host$orig_uri$fragment$is_args$filtered_args;
  }
}
